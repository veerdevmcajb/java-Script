<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: aliceblue;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            color: #356;
        }
        .container{
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 25 rgba(0,0,0,0.1);
            padding: 25px 20px;

        }
        .todo-header{
            width: 100%;
            margin-bottom: 20px;
        }
        .todo-header h1{
            font-size: 1.8rem;
            color: #0075fd;
        }
        .todo-input{
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            
        }
        .todo-input input{
            flex:1;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }
        .todo-input input:focus{
            outline: none;
            border: 1px solid #0075fd;
        }
        .todo-input button{
            background-color: #0075fd;
            border: none;
            padding: 12px ;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
            border-radius: 10px;
            
        }
        .filters{
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .filters button{
            flex: 1;
            margin: 0.5px;
            padding: 5px;
            border: none;
            border-radius: 10px;
            background:#f2f2f2;
            font-size : 0.9rem;
            cursor: pointer;
        }
        .filters button.active{
            background-color: #0075fd;
            color: #fff;
            font-weight: bold;
        }
        .filters button:hover{
            background: #ddd;
        }
        .todo-list{
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .todo-list li{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="todo-header">
            <h1>My TO-DO list</h1>
        </div>

        <div class="todo-input">
            <input type="text" placeholder="Add a new task..." id="taskInput">
            <button id="addbtn">Add</button>
        </div>

        <div class="filters">
            <button class="active" data-filter="all">All</button>
            <button data-filter="completed">Completed</button>
            <button data-filter="not-completed">Not Completed</button>
        </div>

        <ul class="todo-list" id="taskList"></ul>

    </div>
    
    <script>

        let tasklist=document.getElementById("taskList");
        let filterButtons=document.getElementById(".filters button");

        let currentFilter="all";

            if(currentFilter==="completed"){
                filterTasks=task.filter(task=>task.completed);
            }

                filterTasks=task.filter(task=>!task.completed);
            }

    </script>
</body>
</html>
